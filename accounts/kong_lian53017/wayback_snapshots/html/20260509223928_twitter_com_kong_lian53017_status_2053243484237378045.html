  不论东玄还是西玄，我觉得一旦去算自己的命就是把自己框在了一个固定的走向或者流程里，选择难免会受当时算出的结果影响。这是在潜意识里的东西，很难说到底是命真是如此还是你潜意识自认为你的命是如此所以你那么选了，你自己根本意识不到。
